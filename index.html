<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obscure Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(13, 13, 13, 0.85);
            --accent: #8b5cf6;
            --accent-soft: rgba(139, 92, 246, 0.15);
            --accent-border: rgba(139, 92, 246, 0.3);
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        /* Ambient Dynamic Background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, #1e1b4b 0%, transparent 40%),
                        radial-gradient(circle at 70% 70%, #312e81 0%, transparent 40%);
            z-index: -1;
            filter: blur(80px);
            animation: bgMove 20s infinite alternate ease-in-out;
            opacity: 0.6;
        }

        @keyframes bgMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(5deg); }
        }

        /* Glass Panel */
        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            height: 100%;
            display: flex;
            overflow: hidden;
            animation: panelFade 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes panelFade {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Auth Screen */
        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 30px;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff, #a1a1aa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            margin-bottom: 40px;
            font-size: 1rem;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: white;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
        }

        button:active { transform: scale(0.98); }

        button.secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            margin-top: 16px;
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: none;
        }

        /* Messenger Layout */
        #messenger-screen {
            display: none;
            width: 100%;
            height: 100%;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 360px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
        }

        .me-bar {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .me-avatar {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .me-info h3 { font-size: 1rem; font-weight: 700; }
        .me-info p { font-size: 0.8rem; color: #4ade80; font-weight: 600; }

        .sidebar-search {
            padding: 20px 24px;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px;
        }

        .contact-item {
            padding: 16px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 4px;
        }

        .contact-item:hover { background: rgba(255, 255, 255, 0.04); }
        .contact-item.active { background: var(--accent-soft); border: 1px solid var(--accent-border); }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 15px;
            background: #27272a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }

        .contact-name { font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
        .contact-status { font-size: 0.8rem; color: var(--text-dim); }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.1);
        }

        .chat-header {
            padding: 20px 32px;
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .active-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 8px #4ade80; }

        .message-feed {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            max-width: 75%;
            padding: 14px 20px;
            border-radius: 22px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: msgPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgPop {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.sent {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        .modal-card {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            width: 100%;
            max-width: 440px;
            padding: 40px;
            position: relative;
            transform: scale(0.95);
            animation: modalScale 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes modalScale { to { transform: scale(1); } }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.2s;
        }

        .modal-close:hover { opacity: 1; }

        .form-row { margin-bottom: 20px; }
        .form-row label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }

        /* Media Messaging */
        .message img, .message video {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 8px;
            display: block;
            cursor: pointer;
        }

        .attachment-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: 0.2s;
        }

        .attachment-btn:hover { background: rgba(255, 255, 255, 0.1); }

        .saved-tag {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .unread-badge {
            background: var(--accent);
            color: white;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0 6px;
            box-shadow: 0 0 10px var(--accent);
        }

        .group-tag { border: 1px solid var(--accent); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; }

        .msg-status { font-size: 0.6rem; opacity: 0.5; margin-left: 6px; }

        .chat-input-area {
            padding: 24px 32px;
            background: rgba(10, 10, 10, 0.4);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 16px;
        }

        .chat-input-area input {
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.2);
        }

        .chat-input-area button {
            width: auto;
            margin-top: 0;
            padding: 0 28px;
            border-radius: 15px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; z-index: 20; }
            .sidebar.hidden { transform: translateX(-100%); }
            .chat-area { width: 100%; }
            .back-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.05); cursor: pointer; }
        }
    </style>
</head>

    <div class="bg-glow"></div>

    <div class="glass-panel">

        <div id="auth-screen">
            <div class="auth-card">
                <h1>OBSCURE</h1>
                <p class="subtitle">Enter the shadows of communication.</p>
                <div id="auth-form">
                    <input type="text" id="username" placeholder="Login ID">
                    <input type="password" id="password" placeholder="Password">
                    <button id="btn-login">Login</button>
                    <button id="btn-signup" class="secondary">Create Account</button>
                </div>
                <p id="auth-error" style="color: #f87171; font-size: 0.8rem; margin-top: 16px; display: none;"></p>
            </div>
        </div>

        <!-- Messenger View -->
        <div id="messenger-screen">
            <div class="sidebar" id="sidebar">
                <div class="me-bar" style="justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <div class="me-avatar" id="my-avatar">?</div>
                        <div class="me-info">
                            <h3 id="my-username">Loading...</h3>
                            <p>Online</p>
                        </div>
                    </div>
                    <div class="attachment-btn" id="btn-settings" style="width: 40px; height: 40px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </div>
                </div>
                <div class="sidebar-search" style="display: flex; gap: 6px;">
                    <input type="text" id="user-search" placeholder="Find by ID..." style="flex: 1; padding: 10px 12px; font-size: 0.85rem;">
                    <button id="btn-new-channel" class="secondary" title="New Channel" style="width: 38px; height: 38px; padding: 0; border-radius: 10px; margin: 0; display: flex; align-items: center; justify-content: center;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </button>
                    <button id="btn-new-group" class="secondary" title="New Group" style="width: 38px; height: 38px; padding: 0; border-radius: 10px; margin: 0; display: flex; align-items: center; justify-content: center;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    </button>
                </div>
                <div class="contact-list" id="contact-list">

                </div>
                <div style="padding: 16px; border-top: 1px solid var(--glass-border); display: flex; gap: 8px;">

                    <div style="flex: 1;">

                        <div style="display: flex; align-items: center; gap: 6px;">

                </div>

                </form>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->

        <div class="modal-card">
            <div class="modal-close" onclick="closeModal('settings-modal')">

            </div>
            <h2 style="margin-bottom: 24px;">Settings</h2>

                <label id="lbl-avatar">Profile Avatar</label>
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div class="me-avatar" id="set-avatar-preview" style="width: 64px; height: 64px;">?</div>
                    <button class="secondary" onclick="document.getElementById('avatar-input').click()" style="width: auto; margin: 0; padding: 10px 20px;">Upload</button>
                    <input type="file" id="avatar-input" style="display: none;" accept="image/*">
                </div>
            </div>

            <div class="form-row">
                <label id="lbl-username">Login ID (Username)</label>
                <input type="text" id="set-username" placeholder="New login ID">
            </div>

            <div class="form-row">
                <label id="lbl-display-name">Display Name</label>
                <input type="text" id="set-display-name" placeholder="Public name">
            </div>

            <div class="form-row">
                <label id="lbl-lang">Interface Language</label>
                <select id="set-lang" onchange="changeLang(this.value)" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white;">
                    <option value="en">English</option>
                    <option value="ru">Русский</option>
                </select>
            </div>

            <div class="form-row">
                <label id="lbl-password">Change Password</label>
                <input type="password" id="set-password" placeholder="New password (blank to keep)">
            </div>

            <button id="btn-save-settings">Save All Changes</button>
            <div id="settings-error" style="color: #ef4444; font-size: 0.8rem; margin-top: 12px; display: none;"></div>
        </div>
    </div>
    
    <!-- Group Modal -->
    <div class="modal-overlay" id="group-modal">
        <div class="modal-card">
            <div class="modal-close" onclick="closeModal('group-modal')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </div>
            <h2 id="modal-group-title" style="margin-bottom: 24px;">Create Group</h2>
            
            <div class="form-row">
                <label>Group/Channel Name</label>
                <input type="text" id="group-name" placeholder="Enter name...">
            </div>

            <div class="form-row" id="group-members-row">
                <label>Add Member (User ID)</label>
                <input type="text" id="group-member-id" placeholder="Optional User ID">
            </div>

            <button id="btn-create-group">Create Now</button>
        </div>
    </div>

    <!-- Notification Sound -->

                login_btn: "Войти",
                signup_btn: "Создать аккаунт",
                settings_title: "Настройки",
                profile_avatar: "Аватар профиля",
                upload_btn: "Загрузить",
                username_label: "Имя пользователя (ID)",
                display_name_label: "Отображаемое имя",
                password_label: "Сменить пароль",
                save_btn: "Сохранить изменения",
                logout_btn: "Выйти из аккаунта",
                search_placeholder: "Найти по ID...",
                saved_messages: "Избранное",
                cloud_storage: "Облачное хранилище",
                online: "В сети",
                active_now: "В сети",
                type_placeholder: "Напишите сообщение...",
                send_btn: "Отправить",
                lang_label: "Язык интерфейса",
                upload_error: "Загрузка не удалась!",
                channels_label: "КАНАЛЫ",
                groups_label: "ГРУППЫ",
                messages_label: "СООБЩЕНИЯ"
            }
        };

        let currentLang = localStorage.getItem('messenger_lang') || 'en';

        // --- State ---
        let currentUser = null;
        let activeChat = null;
        let unreadCounts = {};
        let isSecretMode = false;
        let secretKey = null;

        // --- Elements ---
        const authScreen = document.getElementById('auth-screen');
        const messengerScreen = document.getElementById('messenger-screen');
        const loginBtn = document.getElementById('btn-login');
        const signupBtn = document.getElementById('btn-signup');
        const logoutBtn = document.getElementById('btn-logout');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const messageFeed = document.getElementById('message-feed');
        const contactList = document.getElementById('contact-list');
        const userSearch = document.getElementById('user-search');
        
        const settingsModal = document.getElementById('settings-modal');
        const btnSettings = document.getElementById('btn-settings');
        const btnSaveSettings = document.getElementById('btn-save-settings');
        const fileInput = document.getElementById('file-input');
        const avatarInput = document.getElementById('avatar-input');
        
        const chatPlaceholder = document.getElementById('chat-placeholder');
        const chatArea = document.getElementById('chat-main');
        const btnBack = document.getElementById('btn-back');
        const sidebar = document.getElementById('sidebar');

        // --- Auth Logic ---
        async function handleAuth(type) {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const errorEl = document.getElementById('auth-error');

            if (!username || !password) return;
            const email = `${username}@obscure.app`;
            errorEl.style.display = 'none';

            let result;
            if (type === 'signup') result = await _supabase.auth.signUp({ email, password });
            else result = await _supabase.auth.signInWithPassword({ email, password });

            if (result.error) {
                errorEl.innerText = result.error.message;
                errorEl.style.display = 'block';
            } else {
                await ensureProfileExists(result.data.user.id, username);
                if (type === 'signup' && !result.data.session) {
                    errorEl.innerText = "Account created! Check mail or use SQL fix.";
                    errorEl.style.display = 'block';
                } else {
                    currentUser = result.data.user;
                    showMessenger();
                }
            }
        }

        async function ensureProfileExists(id, username) {
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', id).single();
            if (!profile) await _supabase.from('profiles').insert({ id, username });
        }

        async function showMessenger() {
            authScreen.style.display = 'none';
            messengerScreen.style.display = 'flex';
            updateMeUI();
            updateLanguageUI();
            loadContacts();

            _supabase.channel('messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const msg = payload.new;
                    if (msg.sender_id !== currentUser.id) {
                        const sound = document.getElementById('notif-sound');
                        if (sound) sound.play().catch(() => {});
                        if (!activeChat || (msg.group_id ? msg.group_id !== activeChat.id : msg.sender_id !== activeChat.id)) {
                            const key = msg.group_id || msg.sender_id;
                            unreadCounts[key] = (unreadCounts[key] || 0) + 1;
                            updateTabTitle();
                        }
                    }
                    if (activeChat && (msg.group_id ? msg.group_id === activeChat.id : (msg.sender_id === activeChat.id || msg.receiver_id === activeChat.id))) {
                        appendMessage(msg);
                    }
                    loadContacts();
                })
                .subscribe();
        }

        function updateTabTitle() {
            const total = Object.values(unreadCounts).reduce((a, b) => a + b, 0);
            document.title = total > 0 ? `(${total}) Obscure` : 'Obscure Messenger';
        }

        async function updateMeUI() {
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            if (profile) {
                const name = profile.display_name || profile.username;
                document.getElementById('my-username').innerText = name;
                const av = document.getElementById('my-avatar');
                if (profile.avatar_url) av.innerHTML = `<img src="${profile.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">`;
                else av.innerText = name[0].toUpperCase();

                document.getElementById('set-username').value = profile.username;
                document.getElementById('set-display-name').value = profile.display_name || '';
            }
            updateLanguageUI();
        }

        function updateLanguageUI() {
            const t = translations[currentLang];
            document.getElementById('user-search').placeholder = t.search_placeholder;
            document.getElementById('btn-logout').innerText = t.logout_btn;
            document.getElementById('message-input').placeholder = t.type_placeholder;
            document.getElementById('btn-send').innerText = t.send_btn;
            loadContacts();
        }

        function changeLang(lang) {
            currentLang = lang;
            localStorage.setItem('messenger_lang', lang);
            updateLanguageUI();
        }

        async function encrypt(text) {
            if (!isSecretMode || !secretKey) return text;
            return "[Secret]" + btoa(text);
        }
        function decrypt(text) {
            if (text && text.startsWith("[Secret]")) {
                try { return atob(text.replace("[Secret]", "")); } catch { return "[Encrypted]"; }
            }
            return text;
        }

        async function selectChat(chat) {
            activeChat = chat;
            if (chat.id) unreadCounts[chat.id] = 0;
            updateTabTitle();
            chatPlaceholder.style.display = 'none';
            chatArea.style.display = 'flex';
            
            const name = chat.isSaved ? translations[currentLang].saved_messages : (chat.display_name || chat.username || chat.name);
            document.getElementById('current-chat-name').innerText = name;
            
            const av = document.getElementById('current-chat-avatar');
            av.style.background = chat.isSaved ? 'var(--accent)' : 'var(--accent-soft)';
            av.style.color = 'white';
            
            if (chat.isSaved) {
                av.innerHTML = '💾';
            } else if (chat.avatar_url) {
                av.innerHTML = `<img src="${chat.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">`;
            } else {
                av.innerText = name ? name[0].toUpperCase() : '?';
            }

            loadMessages();
            loadContacts();
            if (window.innerWidth <= 768) sidebar.classList.add('hidden');
        }

        async function loadContacts() {
            const { data: profiles } = await _supabase.from('profiles').select('*');
            const { data: groups } = await _supabase.from('groups').select('*, group_members!inner(*)').eq('group_members.user_id', currentUser.id);
            renderContacts(profiles.filter(p => p.id !== currentUser.id), groups || []);
        }

        function renderContacts(profiles, groups) {
            const t = translations[currentLang];
            contactList.innerHTML = '';

            // Saved Messages
            const saved = document.createElement('div');
            saved.className = `contact-item ${activeChat?.isSaved ? 'active' : ''}`;
            const unreadSaved = unreadCounts[currentUser.id] || 0;
            saved.innerHTML = `<div class="avatar" style="background:var(--accent);">💾</div><div class="contact-info"><div class="contact-name">${t.saved_messages}</div></div>${unreadSaved > 0 ? `<div class="unread-badge">${unreadSaved}</div>` : ''}`;
            saved.onclick = () => selectChat({ id: currentUser.id, isSaved: true });
            contactList.appendChild(saved);

            // Channels
            const channels = groups.filter(g => g.is_channel);
            if (channels.length > 0) {
                const h = document.createElement('div');
                h.style = 'font-size: 0.65rem; color: var(--accent); padding: 12px 16px 4px; font-weight: 800; letter-spacing: 1px;';
                h.innerText = t.channels_label;
                contactList.appendChild(h);
                channels.forEach(g => {
                    const item = document.createElement('div');
                    item.className = `contact-item ${activeChat?.id === g.id ? 'active' : ''}`;
                    const unread = unreadCounts[g.id] || 0;
                    item.innerHTML = `<div class="avatar" style="background:var(--accent-soft);color:var(--accent);">📣</div><div class="contact-info"><div class="contact-name">${g.name}</div><div class="contact-status">Public Channel</div></div>${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}`;
                    item.onclick = () => selectChat(g);
                    contactList.appendChild(item);
                });
            }

            // Groups
            const prGroups = groups.filter(g => !g.is_channel);
            if (prGroups.length > 0) {
                const h = document.createElement('div');
                h.style = 'font-size: 0.65rem; color: var(--accent); padding: 12px 16px 4px; font-weight: 800; letter-spacing: 1px;';
                h.innerText = t.groups_label;
                contactList.appendChild(h);
                prGroups.forEach(g => {
                    const item = document.createElement('div');
                    item.className = `contact-item ${activeChat?.id === g.id ? 'active' : ''}`;
                    const unread = unreadCounts[g.id] || 0;
                    item.innerHTML = `<div class="avatar" style="background:var(--accent-soft);color:var(--accent);">👥</div><div class="contact-info"><div class="contact-name">${g.name}</div><div class="contact-status">Private Group</div></div>${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}`;
                    item.onclick = () => selectChat(g);
                    contactList.appendChild(item);
                });
            }

            // Users
            if (profiles.length > 0) {
                const h = document.createElement('div');
                h.style = 'font-size: 0.65rem; color: var(--accent); padding: 12px 16px 4px; font-weight: 800; letter-spacing: 1px;';
                h.innerText = t.messages_label;
                contactList.appendChild(h);
                profiles.forEach(p => {
                    const item = document.createElement('div');
                    item.className = `contact-item ${activeChat?.id === p.id && !activeChat.isSaved ? 'active' : ''}`;
                    const unread = unreadCounts[p.id] || 0;
                    const name = p.display_name || p.username;
                    item.innerHTML = `<div class="avatar" style="${p.avatar_url ? '' : 'background: ' + getAvatarColor(name)}">${p.avatar_url ? `<img src="${p.avatar_url}" style="width:100%;height:100%;border-radius:inherit;object-fit:cover;">` : name[0].toUpperCase()}</div><div class="contact-info"><div class="contact-name">${name}</div></div>${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}`;
                    item.onclick = () => selectChat(p);
                    contactList.appendChild(item);
                });
            }
        }

        function getAvatarColor(name) {
            const colors = ['#f87171', '#fb923c', '#fbbf24', '#a3e635', '#4ade80', '#2dd4bf', '#22d3ee', '#60a5fa', '#818cf8', '#a78bfa', '#c084fc', '#f472b6'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        async function loadMessages() {
            messageFeed.innerHTML = '';
            let q = _supabase.from('messages').select('*').order('created_at', { ascending: true });
            if (activeChat.isSaved) q = q.eq('sender_id', currentUser.id).eq('receiver_id', currentUser.id);
            else if (activeChat.name) q = q.eq('group_id', activeChat.id);
            else q = q.or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChat.id}),and(sender_id.eq.${activeChat.id},receiver_id.eq.${currentUser.id})`);
            const { data } = await q;
            if (data) data.forEach(msg => appendMessage(msg));
            messageFeed.scrollTop = messageFeed.scrollHeight;
        }

        function appendMessage(msg) {
            const isSent = msg.sender_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            let content = decrypt(msg.content);
            if (msg.file_url) content += `<br><img src="${msg.file_url}" style="max-width:200px;border-radius:10px;">`;
            div.innerHTML = `${content}<div class="message-time">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>`;
            messageFeed.appendChild(div);
            messageFeed.scrollTop = messageFeed.scrollHeight;
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file || !activeChat) return;
            const path = `${currentUser.id}/${Date.now()}_${file.name}`;
            await _supabase.storage.from('uploads').upload(path, file);
            const { data: { publicUrl } } = _supabase.storage.from('uploads').getPublicUrl(path);
            const msg = { sender_id:currentUser.id, file_url:publicUrl };
            if (activeChat.name) msg.group_id = activeChat.id; else msg.receiver_id = activeChat.id;
            await _supabase.from('messages').insert(msg);
        }

        async function handleCreateGroup(isChannel = false) {
            const name = document.getElementById('group-name').value.trim();
            const memberId = document.getElementById('group-member-id').value.trim();
            if (!name) return;
            const { data: group } = await _supabase.from('groups').insert({ name, owner_id: currentUser.id, is_channel: isChannel }).select().single();
            if (group) {
                const members = [{ group_id: group.id, user_id: currentUser.id }];
                if (memberId) members.push({ group_id: group.id, user_id: memberId });
                await _supabase.from('group_members').insert(members);
                closeModal('group-modal');
                selectChat(group);
            }
        }

        function toggleSecretChat() {
            isSecretMode = !isSecretMode;
            if (isSecretMode) secretKey = prompt("Secret Key:");
            alert(isSecretMode ? "Secret Mode ON" : "Secret Mode OFF");
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        loginBtn.onclick = () => handleAuth('login');
        signupBtn.onclick = () => handleAuth('signup');
        logoutBtn.onclick = async () => { await _supabase.auth.signOut(); window.location.reload(); };
        btnSettings.onclick = () => openModal('settings-modal');
        btnSaveSettings.onclick = async () => {
            const username = document.getElementById('set-username').value;
            const display_name = document.getElementById('set-display-name').value;
            await _supabase.from('profiles').update({ username, display_name }).eq('id', currentUser.id);
            closeModal('settings-modal');
            updateMeUI();
        };
        fileInput.onchange = handleFileUpload;
        document.getElementById('btn-new-group').onclick = () => {
            document.getElementById('modal-group-title').innerText = 'Create Group';
            document.getElementById('group-members-row').style.display = 'block';
            document.getElementById('btn-create-group').onclick = () => handleCreateGroup(false);
            openModal('group-modal');
        };
        document.getElementById('btn-new-channel').onclick = () => {
            document.getElementById('modal-group-title').innerText = 'Create Channel';
            document.getElementById('group-members-row').style.display = 'none';
            document.getElementById('btn-create-group').onclick = () => handleCreateGroup(true);
            openModal('group-modal');
        };
        document.getElementById('btn-secret-chat').onclick = toggleSecretChat;
        btnBack.onclick = () => sidebar.classList.remove('hidden');

        messageForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !activeChat) return;
            const content = await encrypt(text);
            const msg = { sender_id: currentUser.id, content };
            if (activeChat.name) msg.group_id = activeChat.id; else msg.receiver_id = activeChat.id;
            await _supabase.from('messages').insert(msg);
            messageInput.value = '';
        };

        _supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) { currentUser = session.user; showMessenger(); }
            else updateLanguageUI();
        });
    </script>
</body>
</html>
