<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obscure Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: rgba(18, 18, 18, 0.95);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.2);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* Ambient Background - CLEANED UP */
        .bg-glow {
            display: none; /* Removed as requested */
        }

        /* Glass Container - FULL SCREEN */
        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: none;
            width: 100%;
            height: 100%;
            display: flex;
            overflow: hidden;
            animation: fadeIn 0.4s ease-out;
        }

        /* Auth Screen - CLEANER */
        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: var(--bg);
            padding: 40px;
            text-align: center;
            z-index: 100;
        }

        .auth-card {
            width: 100%;
            max-width: 380px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 12px;
            letter-spacing: -2px;
            font-weight: 800;
            color: #fff;
        }

        p.subtitle {
            color: var(--text-dim);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 14px;
            color: white;
            outline: none;
            transition: 0.2s;
            font-size: 1rem;
        }

        input:focus {
            border-color: var(--accent);
            background: #222;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            font-size: 1rem;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: transparent;
            border: 1px solid #333;
            margin-top: 16px;
        }

        /* Messenger Layout */
        #messenger-screen {
            display: none;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 340px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            background: #0d0d0d;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .search-box {
            position: relative;
            margin-top: 16px;
        }

        .search-box input {
            margin-bottom: 0;
            font-size: 0.9rem;
            padding: 12px 16px;
            border-radius: 10px;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .contact-item {
            padding: 14px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 6px;
        }

        .contact-item:hover {
            background: var(--glass);
        }

        .contact-item.active {
            background: var(--glass);
            border-left: 4px solid var(--accent);
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .contact-status {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #080808;
            position: relative;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .back-btn {
            display: none;
            cursor: pointer;
            padding: 8px;
            margin-right: 8px;
        }

        .message-feed {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 1rem;
            position: relative;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.sent {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: #1a1a1a;
            border: 1px solid #333;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            margin-top: 6px;
            opacity: 0.6;
            text-align: right;
        }

        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            background: #0a0a0a;
        }

        .chat-input-area input {
            margin-bottom: 0;
            border-radius: 12px;
        }

        .chat-input-area button {
            width: auto;
            margin-top: 0;
            padding: 0 24px;
            border-radius: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                z-index: 20;
            }
            .sidebar.hidden {
                display: none;
            }
            .chat-area {
                width: 100%;
                display: none;
            }
            .chat-area.active {
                display: flex;
            }
            .back-btn {
                display: block;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <div class="glass-panel">
        <!-- Auth View -->
        <div id="auth-screen">
            <div class="auth-card">
                <h1>OBSCURE</h1>
                <p class="subtitle">Enter the shadows of communication.</p>
                <div id="auth-form">
                    <input type="text" id="username" placeholder="Login ID">
                    <input type="password" id="password" placeholder="Password">
                    <button id="btn-login">Login</button>
                    <button id="btn-signup" class="secondary">Create Account</button>
                </div>
                <p id="auth-error" style="color: #f87171; font-size: 0.8rem; margin-top: 16px; display: none;"></p>
            </div>
        </div>

        <!-- Messenger View -->
        <div id="messenger-screen">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>Chats</h2>
                    <div class="search-box">
                        <input type="text" id="user-search" placeholder="Search by ID...">
                    </div>
                </div>
                <div class="contact-list" id="contact-list">
                    <!-- Contacts will appear here -->
                </div>
                <div style="padding: 12px;">
                    <button id="btn-logout" class="secondary" style="padding: 8px; font-size: 0.8rem;">Logout</button>
                </div>
            </div>

            <div class="chat-area" id="chat-placeholder"
                style="align-items: center; justify-content: center; color: var(--text-dim);">
                <p>Select a contact to start messaging</p>
            </div>

            <div class="chat-area" id="chat-main" style="display: none;">
                <div class="chat-header">
                    <div class="back-btn" id="btn-back">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </div>
                    <div class="avatar" id="current-chat-avatar">?</div>
                    <div>
                        <div class="contact-name" id="current-chat-name">Unknown</div>
                        <div class="contact-status">online</div>
                    </div>
                </div>
                <div class="message-feed" id="message-feed">
                    <!-- Messages will appear here -->
                </div>
                <form class="chat-input-area" id="message-form">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button type="submit">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // --- Supabase Config ---
        // REPLACE THESE WITH YOUR OWN SUPABASE PROJECT DETAILS
        const SUPABASE_URL = 'https://apkwkiszxbedcieohoeq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_03Ep--VuOU3PTtguDDXXxA_fbgD8F8p';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- State ---
        let currentUser = null;
        let activeChat = null;

        // --- Elements ---
        const authScreen = document.getElementById('auth-screen');
        const messengerScreen = document.getElementById('messenger-screen');
        const loginBtn = document.getElementById('btn-login');
        const signupBtn = document.getElementById('btn-signup');
        const logoutBtn = document.getElementById('btn-logout');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const messageFeed = document.getElementById('message-feed');
        const contactList = document.getElementById('contact-list');
        const userSearch = document.getElementById('user-search');

        // --- Auth Logic ---
        async function handleAuth(type) {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const errorEl = document.getElementById('auth-error');

            if (!username || !password) return;

            // Proxy username to email for Supabase Auth
            const email = `${username}@obscure.app`;

            errorEl.style.display = 'none';

            let result;
            if (type === 'signup') {
                result = await _supabase.auth.signUp({ email, password });
            } else {
                result = await _supabase.auth.signInWithPassword({ email, password });
            }

            if (result.error) {
                errorEl.innerText = result.error.message;
                errorEl.style.display = 'block';
            } else {
                // Ensure profile exists in profiles table
                const { data: profile } = await _supabase.from('profiles').select('*').eq('id', result.data.user.id).single();
                
                if (!profile) {
                    const { error: pErr } = await _supabase.from('profiles').insert({
                        id: result.data.user.id,
                        username: username
                    });
                    if (pErr) console.error("Profile creation error:", pErr);
                }

                if (type === 'signup' && !result.data.session) {
                    alert("Account created! Please confirm user in Supabase (Users table) OR disable 'Confirm Email' in settings.");
                } else {
                    currentUser = result.data.user;
                    showMessenger();
                }
            }
        }

        async function showMessenger() {
            authScreen.style.display = 'none';
            messengerScreen.style.display = 'flex';
            loadContacts();

            // Subscribe to real-time messages
            _supabase.channel('messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const msg = payload.new;
                    if (activeChat && (msg.sender_id === activeChat.id || msg.receiver_id === activeChat.id)) {
                        appendMessage(msg);
                    }
                    loadContacts();
                })
                .subscribe();
        }

        async function loadContacts() {
            const { data, error } = await _supabase
                .from('messages')
                .select('sender_id, receiver_id')
                .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`);

            const contactIds = new Set();
            if (data) data.forEach(m => {
                if (m.sender_id !== currentUser.id) contactIds.add(m.sender_id);
                if (m.receiver_id !== currentUser.id) contactIds.add(m.receiver_id);
            });

            if (contactIds.size === 0) {
                contactList.innerHTML = '<p style="text-align:center; padding:20px; color:var(--text-dim); font-size:0.8rem;">Search for a login ID to start chatting</p>';
                return;
            }

            const { data: profiles } = await _supabase.from('profiles').select('*').in('id', Array.from(contactIds));
            renderContacts(profiles || []);
        }

        function renderContacts(profiles) {
            contactList.innerHTML = '';
            profiles.forEach(profile => {
                const item = document.createElement('div');
                item.className = `contact-item ${activeChat?.id === profile.id ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="avatar">${profile.username[0].toUpperCase()}</div>
                    <div class="contact-info">
                        <div class="contact-name">${profile.username}</div>
                        <div class="contact-status">${profile.status}</div>
                    </div>
                `;
                item.onclick = () => selectChat(profile);
                contactList.appendChild(item);
            });
        }

        // Search logic - CASE INSENSITIVE using ilike
        userSearch.onkeypress = async (e) => {
            if (e.key === 'Enter') {
                const query = userSearch.value.trim();
                if (!query) return;

                const { data, error } = await _supabase
                    .from('profiles')
                    .select('*')
                    .ilike('username', query)
                    .single();

                if (data) {
                    selectChat(data);
                    userSearch.value = '';
                } else {
                    alert(`User "${query}" not found. TIP: Check if the user really registered and if you correctly disabled email confirmation.`);
                }
            }
        };

        async function selectChat(profile) {
            activeChat = profile;
            
            // Mobile navigation: hide sidebar, show chat
            if (window.innerWidth <= 768) {
                document.querySelector('.sidebar').classList.add('hidden');
                document.getElementById('chat-main').classList.add('active');
            }

            document.getElementById('chat-placeholder').style.display = 'none';
            document.getElementById('chat-main').style.display = 'flex';
            document.getElementById('current-chat-name').innerText = profile.username;
            document.getElementById('current-chat-avatar').innerText = profile.username[0].toUpperCase();

            loadMessages();
        }

        // Back button for mobile
        document.getElementById('btn-back').onclick = () => {
            document.querySelector('.sidebar').classList.remove('hidden');
            document.getElementById('chat-main').classList.remove('active');
            document.getElementById('chat-main').style.display = 'none';
            document.getElementById('chat-placeholder').style.display = 'flex';
        };

        async function loadMessages() {
            messageFeed.innerHTML = '';
            const { data, error } = await _supabase
                .from('messages')
                .select('*')
                .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
                .or(`sender_id.eq.${activeChat.id},receiver_id.eq.${activeChat.id}`)
                .order('created_at', { ascending: true });

            if (data) data.forEach(msg => appendMessage(msg));
            messageFeed.scrollTop = messageFeed.scrollHeight;
        }

        function appendMessage(msg) {
            const isSent = msg.sender_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            div.innerHTML = `
                ${msg.content}
                <div class="message-time">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
            `;
            messageFeed.appendChild(div);
            messageFeed.scrollTop = messageFeed.scrollHeight;
        }

        // --- Event Listeners ---
        loginBtn.onclick = () => handleAuth('login');
        signupBtn.onclick = () => handleAuth('signup');
        logoutBtn.onclick = async () => {
            await _supabase.auth.signOut();
            window.location.reload();
        };

        messageForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !activeChat) return;

            const { error } = await _supabase.from('messages').insert({
                sender_id: currentUser.id,
                receiver_id: activeChat.id,
                content: text
            });

            if (!error) messageInput.value = '';
        };

        // Check active session
        _supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                currentUser = session.user;
                showMessenger();
            }
        });
    </script>
</body>

</html>
