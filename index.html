<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obscure Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(13, 13, 13, 0.85);
            --accent: #8b5cf6;
            --accent-soft: rgba(139, 92, 246, 0.15);
            --accent-border: rgba(139, 92, 246, 0.3);
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        /* Ambient Dynamic Background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, #1e1b4b 0%, transparent 40%),
                        radial-gradient(circle at 70% 70%, #312e81 0%, transparent 40%);
            z-index: -1;
            filter: blur(80px);
            animation: bgMove 20s infinite alternate ease-in-out;
            opacity: 0.6;
        }

        @keyframes bgMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(5deg); }
        }

        /* Glass Panel */
        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            height: 100%;
            display: flex;
            overflow: hidden;
            animation: panelFade 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes panelFade {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Auth Screen */
        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 30px;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff, #a1a1aa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            margin-bottom: 40px;
            font-size: 1rem;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: white;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
        }

        button:active { transform: scale(0.98); }

        button.secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            margin-top: 16px;
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: none;
        }

        /* Messenger Layout */
        #messenger-screen {
            display: none;
            width: 100%;
            height: 100%;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 360px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
        }

        .me-bar {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .me-avatar {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .me-info h3 { font-size: 1rem; font-weight: 700; }
        .me-info p { font-size: 0.8rem; color: #4ade80; font-weight: 600; }

        .sidebar-search {
            padding: 20px 24px;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px;
        }

        .contact-item {
            padding: 16px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 4px;
        }

        .contact-item:hover { background: rgba(255, 255, 255, 0.04); }
        .contact-item.active { background: var(--accent-soft); border: 1px solid var(--accent-border); }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 15px;
            background: #27272a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }

        .contact-name { font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
        .contact-status { font-size: 0.8rem; color: var(--text-dim); }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.1);
        }

        .chat-header {
            padding: 20px 32px;
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .active-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 8px #4ade80; }

        .message-feed {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            max-width: 75%;
            padding: 14px 20px;
            border-radius: 22px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: msgPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgPop {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.sent {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            margin-top: 6px;
            opacity: 0.5;
            text-align: right;
        }

        .chat-input-area {
            padding: 24px 32px;
            background: rgba(10, 10, 10, 0.4);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 16px;
        }

        .chat-input-area input {
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.2);
        }

        .chat-input-area button {
            width: auto;
            margin-top: 0;
            padding: 0 28px;
            border-radius: 15px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; z-index: 20; }
            .sidebar.hidden { transform: translateX(-100%); }
            .chat-area { width: 100%; }
            .back-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.05); cursor: pointer; }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <div class="glass-panel">
        <!-- Auth View -->
        <div id="auth-screen">
            <div class="auth-card">
                <h1>OBSCURE</h1>
                <p class="subtitle">Enter the shadows of communication.</p>
                <div id="auth-form">
                    <input type="text" id="username" placeholder="Login ID">
                    <input type="password" id="password" placeholder="Password">
                    <button id="btn-login">Login</button>
                    <button id="btn-signup" class="secondary">Create Account</button>
                </div>
                <p id="auth-error" style="color: #f87171; font-size: 0.8rem; margin-top: 16px; display: none;"></p>
            </div>
        </div>

        <!-- Messenger View -->
        <div id="messenger-screen">
            <div class="sidebar" id="sidebar">
                <div class="me-bar">
                    <div class="me-avatar" id="my-avatar">?</div>
                    <div class="me-info">
                        <h3 id="my-username">Loading...</h3>
                        <p>Online</p>
                    </div>
                </div>
                <div class="sidebar-search">
                    <input type="text" id="user-search" placeholder="Find user by ID...">
                </div>
                <div class="contact-list" id="contact-list">
                    <!-- Contacts will appear here -->
                </div>
                <div style="padding: 16px; border-top: 1px solid var(--glass-border);">
                    <button id="btn-logout" class="secondary" style="padding: 10px; font-size: 0.8rem; margin-top: 0;">Logout</button>
                </div>
            </div>

            <div class="chat-area" id="chat-placeholder"
                style="align-items: center; justify-content: center; color: var(--text-dim); text-align: center; padding: 40px;">
                <div style="opacity: 0.3; margin-bottom: 20px;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <p>Select a conversation to start<br>or search for a friend by ID</p>
            </div>

            <div class="chat-area" id="chat-main" style="display: none;">
                <div class="chat-header">
                    <div class="back-btn" id="btn-back">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </div>
                    <div class="avatar" id="current-chat-avatar">?</div>
                    <div style="flex: 1;">
                        <div class="contact-name" id="current-chat-name">Unknown</div>
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <div class="active-dot"></div>
                            <div class="contact-status" style="color: #4ade80;">Active now</div>
                        </div>
                    </div>
                </div>
                <div class="message-feed" id="message-feed">
                    <!-- Messages will appear here -->
                </div>
                <form class="chat-input-area" id="message-form">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button type="submit">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // --- Supabase Config ---
        // REPLACE THESE WITH YOUR OWN SUPABASE PROJECT DETAILS
        const SUPABASE_URL = 'https://apkwkiszxbedcieohoeq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_03Ep--VuOU3PTtguDDXXxA_fbgD8F8p';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- State ---
        let currentUser = null;
        let activeChat = null;

        // --- Elements ---
        const authScreen = document.getElementById('auth-screen');
        const messengerScreen = document.getElementById('messenger-screen');
        const loginBtn = document.getElementById('btn-login');
        const signupBtn = document.getElementById('btn-signup');
        const logoutBtn = document.getElementById('btn-logout');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const messageFeed = document.getElementById('message-feed');
        const contactList = document.getElementById('contact-list');
        const userSearch = document.getElementById('user-search');

        // --- Auth Logic ---
        async function handleAuth(type) {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const errorEl = document.getElementById('auth-error');

            if (!username || !password) return;

            // Proxy username to email for Supabase Auth (Invisible to user)
            const email = `${username}@obscure.app`;
            errorEl.style.display = 'none';

            let result;
            if (type === 'signup') {
                result = await _supabase.auth.signUp({ email, password });
            } else {
                result = await _supabase.auth.signInWithPassword({ email, password });
            }

            if (result.error) {
                if (result.error.message.includes("Email not confirmed")) {
                    errorEl.innerHTML = `Login error: User exists but not confirmed.<br>Run the FIX script in Supabase SQL Editor!`;
                } else {
                    errorEl.innerText = result.error.message;
                }
                errorEl.style.display = 'block';
            } else {
                // Ensure profile exists (Auto-repair if SQL trigger wasn't run)
                await ensureProfileExists(result.data.user.id, username);

                if (type === 'signup' && !result.data.session) {
                    errorEl.innerHTML = "Account created!<br>Run the FIX script in Supabase to log in.";
                    errorEl.style.color = "#4ade80";
                    errorEl.style.display = 'block';
                } else {
                    currentUser = result.data.user;
                    showMessenger();
                }
            }
        }

        async function ensureProfileExists(id, username) {
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', id).single();
            if (!profile) {
                await _supabase.from('profiles').insert({ id, username });
            }
        }

        async function showMessenger() {
            authScreen.style.display = 'none';
            messengerScreen.style.display = 'flex';
            
            // Set current user info
            const username = currentUser.email.split('@')[0];
            document.getElementById('my-username').innerText = username;
            document.getElementById('my-avatar').innerText = username[0].toUpperCase();

            loadContacts();

            // Subscribe to real-time messages
            _supabase.channel('messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const msg = payload.new;
                    // Only append if it's part of active chat AND not already there
                    if (activeChat && (msg.sender_id === activeChat.id || msg.receiver_id === activeChat.id)) {
                        const existing = document.getElementById(`msg-${msg.id}`);
                        if (!existing) appendMessage(msg);
                    }
                    loadContacts();
                })
                .subscribe();
        }

        async function loadContacts() {
            const { data, error } = await _supabase
                .from('messages')
                .select('sender_id, receiver_id')
                .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`);

            const contactIds = new Set();
            if (data) data.forEach(m => {
                if (m.sender_id !== currentUser.id) contactIds.add(m.sender_id);
                if (m.receiver_id !== currentUser.id) contactIds.add(m.receiver_id);
            });

            if (contactIds.size === 0) {
                contactList.innerHTML = '<p style="text-align:center; padding:20px; color:var(--text-dim); font-size:0.8rem;">Search for a login ID to start chatting</p>';
                return;
            }

            const { data: profiles } = await _supabase.from('profiles').select('*').in('id', Array.from(contactIds));
            renderContacts(profiles || []);
        }

        function renderContacts(profiles) {
            contactList.innerHTML = '';
            profiles.forEach(profile => {
                const item = document.createElement('div');
                item.className = `contact-item ${activeChat?.id === profile.id ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="avatar">${profile.username[0].toUpperCase()}</div>
                    <div class="contact-info">
                        <div class="contact-name">${profile.username}</div>
                        <div class="contact-status">${profile.status}</div>
                    </div>
                `;
                item.onclick = () => selectChat(profile);
                contactList.appendChild(item);
            });
        }

        // Search logic - CASE INSENSITIVE using ilike
        userSearch.onkeypress = async (e) => {
            if (e.key === 'Enter') {
                const query = userSearch.value.trim();
                if (!query) return;

                const { data, error } = await _supabase
                    .from('profiles')
                    .select('*')
                    .ilike('username', query)
                    .single();

                if (data) {
                    selectChat(data);
                    userSearch.value = '';
                } else {
                    alert(`User "${query}" not found. TIP: Check if the user really registered and if you correctly disabled email confirmation.`);
                }
            }
        };

        async function selectChat(profile) {
            activeChat = profile;

            // Mobile navigation: hide sidebar, show chat
            if (window.innerWidth <= 768) {
                document.querySelector('.sidebar').classList.add('hidden');
                document.getElementById('chat-main').classList.add('active');
            }

            document.getElementById('chat-placeholder').style.display = 'none';
            document.getElementById('chat-main').style.display = 'flex';
            document.getElementById('current-chat-name').innerText = profile.username;
            document.getElementById('current-chat-avatar').innerText = profile.username[0].toUpperCase();

            loadMessages();
        }

        // Back button for mobile
        document.getElementById('btn-back').onclick = () => {
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('chat-main').style.display = 'none';
            document.getElementById('chat-placeholder').style.display = 'flex';
        };

        async function loadMessages() {
            messageFeed.innerHTML = '';
            const { data, error } = await _supabase
                .from('messages')
                .select('*')
                .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
                .or(`sender_id.eq.${activeChat.id},receiver_id.eq.${activeChat.id}`)
                .order('created_at', { ascending: true });

            if (data) data.forEach(msg => appendMessage(msg));
            messageFeed.scrollTop = messageFeed.scrollHeight;
        }

        function appendMessage(msg) {
            const isSent = msg.sender_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            div.id = `msg-${msg.id}`; // Add ID to prevent duplicates
            div.innerHTML = `
                ${msg.content}
                <div class="message-time">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
            `;
            messageFeed.appendChild(div);
            messageFeed.scrollTop = messageFeed.scrollHeight;
        }

        // --- Event Listeners ---
        loginBtn.onclick = () => handleAuth('login');
        signupBtn.onclick = () => handleAuth('signup');
        logoutBtn.onclick = async () => {
            await _supabase.auth.signOut();
            window.location.reload();
        };

        messageForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !activeChat) return;

            const { error } = await _supabase.from('messages').insert({
                sender_id: currentUser.id,
                receiver_id: activeChat.id,
                content: text
            });

            if (!error) messageInput.value = '';
        };

        // Check active session
        _supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                currentUser = session.user;
                showMessenger();
            }
        });
    </script>
</body>

</html>
