<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obscure Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #030303;
            --surface: rgba(13, 13, 13, 0.85);
            --accent: #8b5cf6;
            --accent-soft: rgba(139, 92, 246, 0.15);
            --accent-border: rgba(139, 92, 246, 0.3);
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        /* Ambient Dynamic Background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, #1e1b4b 0%, transparent 40%),
                        radial-gradient(circle at 70% 70%, #312e81 0%, transparent 40%);
            z-index: -1;
            filter: blur(80px);
            animation: bgMove 20s infinite alternate ease-in-out;
            opacity: 0.6;
        }

        @keyframes bgMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(5deg); }
        }

        /* Glass Panel */
        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            height: 100%;
            display: flex;
            overflow: hidden;
            animation: panelFade 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes panelFade {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Auth Screen */
        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 30px;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff, #a1a1aa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            margin-bottom: 40px;
            font-size: 1rem;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: white;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
        }

        button:active { transform: scale(0.98); }

        button.secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            margin-top: 16px;
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: none;
        }

        /* Messenger Layout */
        #messenger-screen {
            display: none;
            width: 100%;
            height: 100%;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 360px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
        }

        .me-bar {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .me-avatar {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .me-info h3 { font-size: 1rem; font-weight: 700; }
        .me-info p { font-size: 0.8rem; color: #4ade80; font-weight: 600; }

        .sidebar-search {
            padding: 20px 24px;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px;
        }

        .contact-item {
            padding: 16px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 4px;
        }

        .contact-item:hover { background: rgba(255, 255, 255, 0.04); }
        .contact-item.active { background: var(--accent-soft); border: 1px solid var(--accent-border); }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 15px;
            background: #27272a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }

        .contact-name { font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
        .contact-status { font-size: 0.8rem; color: var(--text-dim); }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.1);
        }

        .chat-header {
            padding: 20px 32px;
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .active-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 8px #4ade80; }

        .message-feed {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            max-width: 75%;
            padding: 14px 20px;
            border-radius: 22px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: msgPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgPop {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.sent {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        .modal-card {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            width: 100%;
            max-width: 440px;
            padding: 40px;
            position: relative;
            transform: scale(0.95);
            animation: modalScale 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes modalScale { to { transform: scale(1); } }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.2s;
        }

        .modal-close:hover { opacity: 1; }

        .form-row { margin-bottom: 20px; }
        .form-row label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }

        /* Media Messaging */
        .message img, .message video {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 8px;
            display: block;
            cursor: pointer;
        }

        .attachment-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: 0.2s;
        }

        .attachment-btn:hover { background: rgba(255, 255, 255, 0.1); }

        .saved-tag {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .chat-input-area {
            padding: 24px 32px;
            background: rgba(10, 10, 10, 0.4);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 16px;
        }

        .chat-input-area input {
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.2);
        }

        .chat-input-area button {
            width: auto;
            margin-top: 0;
            padding: 0 28px;
            border-radius: 15px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; z-index: 20; }
            .sidebar.hidden { transform: translateX(-100%); }
            .chat-area { width: 100%; }
            .back-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.05); cursor: pointer; }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <div class="glass-panel">
        <!-- Auth View -->
        <div id="auth-screen">
            <div class="auth-card">
                <h1>OBSCURE</h1>
                <p class="subtitle">Enter the shadows of communication.</p>
                <div id="auth-form">
                    <input type="text" id="username" placeholder="Login ID">
                    <input type="password" id="password" placeholder="Password">
                    <button id="btn-login">Login</button>
                    <button id="btn-signup" class="secondary">Create Account</button>
                </div>
                <p id="auth-error" style="color: #f87171; font-size: 0.8rem; margin-top: 16px; display: none;"></p>
            </div>
        </div>

        <!-- Messenger View -->
        <div id="messenger-screen">
            <div class="sidebar" id="sidebar">
                <div class="me-bar" style="justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <div class="me-avatar" id="my-avatar">?</div>
                        <div class="me-info">
                            <h3 id="my-username">Loading...</h3>
                            <p>Online</p>
                        </div>
                    </div>
                    <div class="attachment-btn" id="btn-settings" style="width: 40px; height: 40px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </div>
                </div>
                <div class="sidebar-search">
                    <input type="text" id="user-search" placeholder="Find user by ID...">
                </div>
                <div class="contact-list" id="contact-list">
                    <!-- Contacts will appear here -->
                </div>
                <div style="padding: 16px; border-top: 1px solid var(--glass-border);">
                    <button id="btn-logout" class="secondary" style="padding: 10px; font-size: 0.8rem; margin-top: 0;">Logout Account</button>
                </div>
            </div>

            <div class="chat-area" id="chat-placeholder"
                style="align-items: center; justify-content: center; color: var(--text-dim); text-align: center; padding: 40px;">
                <div style="opacity: 0.3; margin-bottom: 20px;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <p>Select a conversation to start<br>or search for a friend by ID</p>
            </div>

            <div class="chat-area" id="chat-main" style="display: none;">
                <div class="chat-header">
                    <div class="back-btn" id="btn-back">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </div>
                    <div class="avatar" id="current-chat-avatar">?</div>
                    <div style="flex: 1;">
                        <div class="contact-name" id="current-chat-name">Unknown</div>
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <div class="active-dot"></div>
                            <div class="contact-status" style="color: #4ade80;">Active now</div>
                        </div>
                    </div>
                </div>
                <div class="message-feed" id="message-feed">
                    <!-- Messages will appear here -->
                </div>
                <form class="chat-input-area" id="message-form">
                    <input type="file" id="file-input" style="display: none;" accept="image/*,video/*">
                    <div class="attachment-btn" id="btn-attach" style="width: 44px; height: 44px; flex-shrink: 0;" onclick="document.getElementById('file-input').click()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </div>
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" id="btn-send">Send</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-card">
            <div class="modal-close" onclick="closeModal('settings-modal')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </div>
            <h2 style="margin-bottom: 24px;">Settings</h2>
            
            <div class="form-row">
                <label>Profile Avatar</label>
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div class="me-avatar" id="set-avatar-preview" style="width: 64px; height: 64px;">?</div>
                    <button class="secondary" onclick="document.getElementById('avatar-input').click()" style="width: auto; margin: 0; padding: 10px 20px;">Upload</button>
                    <input type="file" id="avatar-input" style="display: none;" accept="image/*">
                </div>
            </div>

            <div class="form-row">
                <label>Login ID (Username)</label>
                <input type="text" id="set-username" placeholder="New login ID">
            </div>

            <div class="form-row">
                <label>Display Name</label>
                <input type="text" id="set-display-name" placeholder="Public name">
            </div>

            <div class="form-row">
                <label>Change Password</label>
                <input type="password" id="set-password" placeholder="New password (blank to keep)">
            </div>

            <button id="btn-save-settings">Save All Changes</button>
            <div id="settings-error" style="color: #ef4444; font-size: 0.8rem; margin-top: 12px; display: none;"></div>
        </div>
    </div>

    <script>
        // --- Supabase Config ---
        // REPLACE THESE WITH YOUR OWN SUPABASE PROJECT DETAILS
        const SUPABASE_URL = 'https://apkwkiszxbedcieohoeq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_03Ep--VuOU3PTtguDDXXxA_fbgD8F8p';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- State ---
        let currentUser = null;
        let activeChat = null;

        // --- Elements ---
        const authScreen = document.getElementById('auth-screen');
        const messengerScreen = document.getElementById('messenger-screen');
        const loginBtn = document.getElementById('btn-login');
        const signupBtn = document.getElementById('btn-signup');
        const logoutBtn = document.getElementById('btn-logout');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const messageFeed = document.getElementById('message-feed');
        const contactList = document.getElementById('contact-list');
        const userSearch = document.getElementById('user-search');
        
        const settingsModal = document.getElementById('settings-modal');
        const btnSettings = document.getElementById('btn-settings');
        const btnSaveSettings = document.getElementById('btn-save-settings');
        const fileInput = document.getElementById('file-input');
        const avatarInput = document.getElementById('avatar-input');

        // --- Auth Logic ---
        async function handleAuth(type) {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const errorEl = document.getElementById('auth-error');

            if (!username || !password) return;

            // Proxy username to email for Supabase Auth (Invisible to user)
            const email = `${username}@obscure.app`;
            errorEl.style.display = 'none';

            let result;
            if (type === 'signup') {
                result = await _supabase.auth.signUp({ email, password });
            } else {
                result = await _supabase.auth.signInWithPassword({ email, password });
            }

            if (result.error) {
                if (result.error.message.includes("Email not confirmed")) {
                    errorEl.innerHTML = `Login error: User exists but not confirmed.<br>Run the FIX script in Supabase SQL Editor!`;
                } else {
                    errorEl.innerText = result.error.message;
                }
                errorEl.style.display = 'block';
            } else {
                // Ensure profile exists (Auto-repair if SQL trigger wasn't run)
                await ensureProfileExists(result.data.user.id, username);

                if (type === 'signup' && !result.data.session) {
                    errorEl.innerHTML = "Account created!<br>Run the FIX script in Supabase to log in.";
                    errorEl.style.color = "#4ade80";
                    errorEl.style.display = 'block';
                } else {
                    currentUser = result.data.user;
                    showMessenger();
                }
            }
        }

        async function ensureProfileExists(id, username) {
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', id).single();
            if (!profile) {
                await _supabase.from('profiles').insert({ id, username });
            }
        }

        async function showMessenger() {
            authScreen.style.display = 'none';
            messengerScreen.style.display = 'flex';
            
            updateMeUI();
            loadContacts();

            // Subscribe to real-time messages
            _supabase.channel('messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const msg = payload.new;
                    if (activeChat && (msg.sender_id === activeChat.id || msg.receiver_id === activeChat.id)) {
                        const existing = document.getElementById(`msg-${msg.id}`);
                        if (!existing) appendMessage(msg);
                    }
                    loadContacts();
                })
                .subscribe();
        }

        async function updateMeUI() {
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            if (profile) {
                const name = profile.display_name || profile.username;
                document.getElementById('my-username').innerText = name;
                const avatarEl = document.getElementById('my-avatar');
                if (profile.avatar_url) {
                    avatarEl.innerHTML = `<img src="${profile.avatar_url}" style="width:100%; height:100%; border-radius:inherit; object-fit:cover;">`;
                } else {
                    avatarEl.innerText = name[0].toUpperCase();
                }

                // Pre-fill settings
                document.getElementById('set-username').value = profile.username;
                document.getElementById('set-display-name').value = profile.display_name || '';
                const preview = document.getElementById('set-avatar-preview');
                if (profile.avatar_url) {
                    preview.innerHTML = `<img src="${profile.avatar_url}" style="width:100%; height:100%; border-radius:inherit; object-fit:cover;">`;
                } else {
                    preview.innerText = profile.username[0].toUpperCase();
                }
            }
        }

        async function loadContacts() {
            const { data: messages } = await _supabase.from('messages').select('sender_id, receiver_id').or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`);
            const contactIds = new Set();
            if (messages) messages.forEach(m => {
                if (m.sender_id !== currentUser.id) contactIds.add(m.sender_id);
                if (m.receiver_id !== currentUser.id) contactIds.add(m.receiver_id);
            });

            const { data: profiles } = await _supabase.from('profiles').select('*').in('id', Array.from(contactIds));
            renderContacts(profiles || []);
        }

        function renderContacts(profiles) {
            contactList.innerHTML = '';
            
            // Add "Saved Messages"
            const savedItem = document.createElement('div');
            savedItem.className = `contact-item ${activeChat?.isSaved ? 'active' : ''}`;
            savedItem.innerHTML = `
                <div class="avatar" style="background: var(--accent);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div class="contact-info">
                    <div class="contact-name">Saved Messages <span class="saved-tag">Self</span></div>
                    <div class="contact-status">Cloud storage</div>
                </div>
            `;
            savedItem.onclick = () => selectChat({ id: currentUser.id, username: 'SavedMessages', isSaved: true });
            contactList.appendChild(savedItem);

            profiles.forEach(p => {
                const item = document.createElement('div');
                item.className = `contact-item ${activeChat?.id === p.id && !activeChat.isSaved ? 'active' : ''}`;
                const name = p.display_name || p.username;
                item.innerHTML = `
                    <div class="avatar">${p.avatar_url ? `<img src="${p.avatar_url}" style="width:100%; height:100%; border-radius:inherit; object-fit:cover;">` : name[0].toUpperCase()}</div>
                    <div class="contact-info">
                        <div class="contact-name">${name}</div>
                        <div class="contact-status">${p.status}</div>
                    </div>
                `;
                item.onclick = () => selectChat(p);
                contactList.appendChild(item);
            });
        }

        async function selectChat(profile) {
            activeChat = profile;
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('chat-placeholder').style.display = 'none';
            document.getElementById('chat-main').style.display = 'flex';
            
            const name = profile.isSaved ? 'Saved Messages' : (profile.display_name || profile.username);
            document.getElementById('current-chat-name').innerText = name;
            const avatarEl = document.getElementById('current-chat-avatar');
            if (profile.isSaved) {
                avatarEl.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
                avatarEl.style.background = 'var(--accent)';
            } else if (profile.avatar_url) {
                avatarEl.innerHTML = `<img src="${profile.avatar_url}" style="width:100%; height:100%; border-radius:inherit; object-fit:cover;">`;
            } else {
                avatarEl.innerText = name[0].toUpperCase();
                avatarEl.style.background = '#27272a';
            }
            loadMessages();
        }

        async function loadMessages() {
            messageFeed.innerHTML = '';
            let query = _supabase.from('messages').select('*').order('created_at', { ascending: true });
            
            if (activeChat.isSaved) {
                query = query.eq('sender_id', currentUser.id).eq('receiver_id', currentUser.id);
            } else {
                query = query.or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChat.id}),and(sender_id.eq.${activeChat.id},receiver_id.eq.${currentUser.id})`);
            }
            
            const { data } = await query;
            if (data) data.forEach(msg => appendMessage(msg));
            messageFeed.scrollTop = messageFeed.scrollHeight;
        }

        function appendMessage(msg) {
            const isSent = msg.sender_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            div.id = `msg-${msg.id}`;

            let content = msg.content || '';
            if (msg.file_url) {
                if (msg.file_type?.startsWith('image/')) {
                    content += `<img src="${msg.file_url}" onclick="window.open('${msg.file_url}')">`;
                } else if (msg.file_type?.startsWith('video/')) {
                    content += `<video src="${msg.file_url}" controls></video>`;
                }
            }

            div.innerHTML = `
                ${content}
                <div class="message-time">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
            `;
            messageFeed.appendChild(div);
            messageFeed.scrollTop = messageFeed.scrollHeight;
        }

        // --- Features Logic ---
        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file || !activeChat) return;

            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random()}.${fileExt}`;
            const filePath = `${currentUser.id}/${fileName}`;

            const { data, error } = await _supabase.storage.from('uploads').upload(filePath, file);
            if (error) {
                alert("Upload failed. Make sure you created a PUBLIC bucket named 'uploads' in Supabase Storage!");
                return;
            }

            const { data: { publicUrl } } = _supabase.storage.from('uploads').getPublicUrl(filePath);
            
            await _supabase.from('messages').insert({
                sender_id: currentUser.id,
                receiver_id: activeChat.id,
                file_url: publicUrl,
                file_type: file.type
            });
        }

        async function handleSaveSettings() {
            const newUsername = document.getElementById('set-username').value.trim();
            const newDisplayName = document.getElementById('set-display-name').value.trim();
            const newPassword = document.getElementById('set-password').value;
            const errorEl = document.getElementById('settings-error');
            errorEl.style.display = 'none';

            try {
                // 1. Update Password if provided
                if (newPassword) {
                    await _supabase.auth.updateUser({ password: newPassword });
                }

                // 2. Update Username (Sync with Auth Email)
                const { data: currentProfile } = await _supabase.from('profiles').select('username').eq('id', currentUser.id).single();
                if (newUsername && newUsername !== currentProfile.username) {
                    const newEmail = `${newUsername}@obscure.app`;
                    const { error: authErr } = await _supabase.auth.updateUser({ email: newEmail });
                    if (authErr) throw authErr;
                }

                // 3. Update Profile Data
                const { error: profErr } = await _supabase.from('profiles').update({
                    username: newUsername,
                    display_name: newDisplayName
                }).eq('id', currentUser.id);
                if (profErr) throw profErr;

                closeModal('settings-modal');
                updateMeUI();
                loadContacts();
            } catch (err) {
                errorEl.innerText = err.message;
                errorEl.style.display = 'block';
            }
        }

        async function handleAvatarUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const filePath = `avatars/${currentUser.id}`;
            await _supabase.storage.from('uploads').upload(filePath, file, { upsert: true });
            const { data: { publicUrl } } = _supabase.storage.from('uploads').getPublicUrl(filePath);
            await _supabase.from('profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
            updateMeUI();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- Event Listeners ---
        loginBtn.onclick = () => handleAuth('login');
        signupBtn.onclick = () => handleAuth('signup');
        logoutBtn.onclick = async () => { await _supabase.auth.signOut(); window.location.reload(); };
        btnSettings.onclick = () => openModal('settings-modal');
        btnSaveSettings.onclick = handleSaveSettings;
        fileInput.onchange = handleFileUpload;
        avatarInput.onchange = handleAvatarUpload;

        userSearch.onkeypress = async (e) => {
            if (e.key === 'Enter') {
                const query = userSearch.value.trim();
                const { data } = await _supabase.from('profiles').select('*').ilike('username', query).single();
                if (data) { selectChat(data); userSearch.value = ''; }
                else { alert("User not found."); }
            }
        };

        messageForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !activeChat) return;
            const { error } = await _supabase.from('messages').insert({
                sender_id: currentUser.id,
                receiver_id: activeChat.id,
                content: text
            });
            if (!error) messageInput.value = '';
        };

        _supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) { currentUser = session.user; showMessenger(); }
        });
    </script>
</body>

</html>
